<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .bg { fill: #111111; }
      .fg { fill: white; }
    }
    @media (prefers-color-scheme: dark) {
      .bg { fill: white; }
      .fg { fill: #111111; }
    }
  </style>
  <rect class="bg" width="180" height="180" rx="37" />
  <!-- Crosshair / Scope icon -->
  <!-- Outer circle -->
  <circle class="fg" cx="90" cy="90" r="48" fill="none" stroke="currentColor" stroke-width="0"/>
  <path class="fg" fill-rule="evenodd" d="
    M90 42
    a48 48 0 1 0 0 96
    a48 48 0 1 0 0-96
    Z
    M90 54
    a36 36 0 1 1 0 72
    a36 36 0 1 1 0-72
    Z
  "/>
  <!-- Inner dot -->
  <circle class="fg" cx="90" cy="90" r="10" />
  <!-- Crosshair lines -->
  <rect class="fg" x="86" y="26" width="8" height="24" rx="4" />
  <rect class="fg" x="86" y="130" width="8" height="24" rx="4" />
  <rect class="fg" x="26" y="86" width="24" height="8" rx="4" />
  <rect class="fg" x="130" y="86" width="24" height="8" rx="4" />
</svg>
